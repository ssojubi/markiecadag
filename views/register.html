<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Markie Cadag Fashion</title>
  <link rel="icon" type="image/x-icon" href="/public/images/mc_logo.jpg">
  <link rel="stylesheet" href="public/css/style.css">
</head>
<body class="auth-body">

<header class="navbar">
  <div class="navbar-top">
    <a href="index.html" class="navbar-brand">
      <img src="public/images/mc.jpg" alt="Markie Cadag Logo" class="logo-img">
      <div class="brand-text">
        <span class="brand-name">Markie Cadag</span>
        <span class="brand-tagline">Fashion House &middot; Est. 2010</span>
      </div>
    </a>
    <div class="navbar-actions">
      <a href="login.html">Already have an account? Sign In</a>
    </div>
  </div>
</header>

<main class="auth-layout auth-layout-register">
  <section class="auth-image" aria-label="Markie Cadag couture">
    <img src="public/images/filipiniana.jpg" alt="Markie Cadag Filipiniana model">
  </section>

  <section class="auth-panel">
    <div class="auth-page">
      <h2>Create Account</h2>
      <p class="subtitle">Join the Markie Cadag family and unlock exclusive benefits</p>

      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Maria" required>
          </div>
          <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Santos" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+63 9xx xxx xxxx">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat your password" required>
        </div>

        <div class="auth-check">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the <a href="/terms">Terms & Conditions</a> and <a href="/privacy">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn btn-gold w-full">Create Account</button>
        <p class="helper">Already a member? <a href="login.html">Sign in</a></p>
      </form>
    </div>
  </section>
</main>

<script>
  async function handleRegister(e) {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  if (pw !== conf) { alert('Passwords do not match.'); return; }

  const body = {
    name: document.getElementById('fname').value + ' ' + document.getElementById('lname').value,
    email: document.getElementById('email').value,
    password: pw,
    phone: document.getElementById('phone').value,
  };

  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (res.ok) {
    alert(data.message);
    window.location.href = 'login.html';
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
