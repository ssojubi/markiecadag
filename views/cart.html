<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="icon" type="image/x-icon" href="/public/images/mc_logo.jpg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="announcement-bar">Review RTW items, VIP discount, and limited stock before checkout</div>
  <header class="navbar">
    <div class="navbar-top">
      <a href="/" class="navbar-brand">
        <img src="/images/mc.jpg" alt="Markie Cadag logo" class="logo-img">
        <div class="brand-text"><span class="brand-name">Markie Cadag</span><span class="brand-tagline">Cart Review</span></div>
      </a>
      <div class="navbar-actions">
        <a href="/rtw">Continue Shopping</a>
        <a href="/checkout" class="btn btn-gold">Checkout</a>
      </div>
    </div>
  </header>

  <main class="cart-page">
    <h2>Shopping Cart</h2>
    <div id="cart-items"></div>
    <div class="cart-footer" id="cart-footer">
      <div class="cart-total">
        <span class="label">Subtotal</span>
        <span class="amount" id="subtotal"></span>
      </div>
      <div class="cart-total">
        <span class="label">VIP Discount</span>
        <span class="amount" id="vip-discount"></span>
      </div>
      <div class="cart-total">
        <span class="label">Payable</span>
        <span class="amount" id="payable"></span>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const itemsEl = document.getElementById('cart-items');
    const subtotalEl = document.getElementById('subtotal');
    const vipEl = document.getElementById('vip-discount');
    const payableEl = document.getElementById('payable');

    function renderCart() {
      const summary = getCartSummary();
      if (!summary.cart.length) {
        itemsEl.innerHTML = '<p>Your cart is empty. <a href="/rtw">Browse RTW products</a>.</p>';
        subtotalEl.textContent = peso(0);
        vipEl.textContent = peso(0);
        payableEl.textContent = peso(0);
        return;
      }

      itemsEl.innerHTML = summary.cart.map((item, index) => `
        <article class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="cart-item-info">
            <span class="cat">${item.category}</span>
            <h3>${item.name}</h3>
            <p>${item.gender} | Size ${item.size}${item.color ? ` | ${item.color}` : ''} | ${item.stock} in stock</p>
            <div class="quantity-controls">
              <button type="button" data-minus="${index}">-</button>
              <span>${item.qty}</span>
              <button type="button" data-plus="${index}">+</button>
            </div>
            <button class="remove-btn" type="button" data-remove="${index}">Remove</button>
          </div>
          <div class="cart-item-price">${peso(item.price * item.qty)}</div>
        </article>
      `).join('');

      subtotalEl.textContent = peso(summary.subtotal);
      vipEl.textContent = `-${peso(summary.vipDiscount)}`;
      payableEl.textContent = peso(summary.discountedSubtotal);

      itemsEl.querySelectorAll('[data-minus]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.minus);
          const item = getCart()[index];
          updateCartQty(index, Math.max(1, item.qty - 1));
          renderCart();
        });
      });
      itemsEl.querySelectorAll('[data-plus]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.plus);
          const item = getCart()[index];
          updateCartQty(index, item.qty + 1);
          renderCart();
        });
      });
      itemsEl.querySelectorAll('[data-remove]').forEach((button) => {
        button.addEventListener('click', () => {
          removeCartItem(Number(button.dataset.remove));
          renderCart();
        });
      });
    }

    window.addEventListener('mc:vip-change', renderCart);
    renderCart();
  </script>
</body>
</html>
